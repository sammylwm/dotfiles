general {
    col.active_border = rgba(9d8c9177)
    col.inactive_border = rgba(50434855)
}

misc {
    background_color = rgba(191114FF)
}

plugin {
    hyprbars {
        # Honestly idk if it works like css, but well, why not
        bar_text_font = Google Sans Flex Medium, Rubik, Geist, AR One Sans, Reddit Sans, Inter, Roboto, Ubuntu, Noto Sans, sans-serif
        bar_height = 30
        bar_padding = 10
        bar_button_padding = 5
        bar_precedence_over_border = true
        bar_part_of_window = true

        bar_color = rgba(191114FF)
        col.text = rgba(eedfe2FF)


        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(eedfe2), 13, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(eedfe2), 13, 󰖯, hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(eedfe2), 13, 󰖰, hyprctl dispatch movetoworkspacesilent special
    }
}

windowrule = border_color rgba(ffb0cfAA) rgba(ffb0cf77), match:pin 1
